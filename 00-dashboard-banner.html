<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HA Dashboard Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1c1e;
    --card-bg: #2a2c2e;
    --dock-bg: #1e2022;
    --text-primary: #e8eaed;
    --text-secondary: #9aa0a6;
    --border: rgba(255,255,255,0.08);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --active-dot: rgba(140,145,200,0.35);
    --toggle-bg: #2a2c2e;
    --toggle-icon: #9aa0a6;
  }

  .light {
    --bg: transparent;
    --card-bg: rgba(255,255,255,0.82);
    --dock-bg: rgba(255,255,255,0.90);
    --text-primary: #1a1c1e;
    --text-secondary: #5f6368;
    --border: rgba(0,0,0,0.06);
    --shadow: 0 8px 32px rgba(0,0,0,0.12);
    --active-dot: rgba(100,110,200,0.18);
    --toggle-bg: rgba(255,255,255,0.85);
    --toggle-icon: #5f6368;
  }

  body {
    font-family: 'Google Sans', sans-serif;
    background: #0d1117;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }

  .banner-wrapper {
    width: 100%;
    max-width: 860px;
  }

  /* \u2500\u2500 Toggle \u2500\u2500 */
  .toggle-row {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 12px;
  }

  .theme-toggle {
    background: var(--toggle-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--toggle-icon);
    font-size: 13px;
    font-family: 'Google Sans', sans-serif;
    transition: all 0.25s ease;
    backdrop-filter: blur(12px);
  }

  .theme-toggle .material-icons-round { font-size: 18px; }

  /* \u2500\u2500 Banner Frame \u2500\u2500 */
  .banner {
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    background: var(--bg);
    transition: background 0.35s ease;
    padding: 28px 24px 100px;
    min-height: 420px;
  }

  /* Backgrounds */
  .banner-bg-dark {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #2d3748 0%, #1a2035 40%, #141820 100%);
    transition: opacity 0.35s ease;
    z-index: 0;
  }

  .banner-bg-light {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #c9d8e8 0%, #b8cfe0 40%, #a8bfd4 100%);
    transition: opacity 0.35s ease;
    opacity: 0;
    z-index: 0;
  }

  .light .banner-bg-dark { opacity: 0; }
  .light .banner-bg-light { opacity: 1; }

  /* Blur blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 260px; height: 260px; background: rgba(100,120,180,0.25); top: -60px; right: -40px; }
  .blob-2 { width: 200px; height: 200px; background: rgba(180,100,120,0.15); bottom: 60px; left: -30px; }

  /* Content above blobs */
  .banner-content { position: relative; z-index: 1; }

  /* \u2500\u2500 Top Bar \u2500\u2500 */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .repo-info { display: flex; align-items: center; gap: 10px; }

  .repo-icon {
    width: 38px; height: 38px;
    background: var(--card-bg);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);
    transition: background 0.35s, border 0.35s;
  }

  .repo-icon .material-icons-round { font-size: 20px; color: #8c91c8; }

  .repo-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    transition: color 0.35s;
    letter-spacing: -0.3px;
  }

  .repo-sub {
    font-size: 12px;
    color: var(--text-secondary);
    transition: color 0.35s;
  }

  .badges { display: flex; gap: 6px; }

  .badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    transition: all 0.35s;
  }

  .badge-hacs { color: #8c91c8; }
  .badge-ver  { color: #7db87d; }
