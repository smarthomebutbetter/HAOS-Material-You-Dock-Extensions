              return `<div style="width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,0.08);"></div>`;
            }

            return `<div style="width:100%;height:100%;border-radius:50%;background-image:url('${url}');background-size:cover;background-position:center;"></div>`;
