            [[[
              return hass.themes.darkMode ? "#f2d380" : "#d4aa3f";
            ]]]
      icon:
        - width: 47px
        - height: 47px
        - color: |
            [[[
              return hass.themes.darkMode ? "#f2d380" : "#d4aa3f";
            ]]]
    card_mod:
      style: |
        ha-card:hover,
        ha-card:active {
          background-color:
